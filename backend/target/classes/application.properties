# ========================================
# PawFund Application Configuration
# ========================================

# Server
server.port=8080

# ---- H2 Database (Default for Development) ----
# spring.datasource.url=jdbc:h2:file:./data/pawfund
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ---- MySQL (Uncomment below and comment H2 above to use MySQL) ----
spring.datasource.url=jdbc:mysql://localhost:3306/cuahangthucung?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# JWT
app.jwt.secret=PawFundSecretKey2024VeryLongSecretKeyForJWTTokenGenerationAndValidation123456789
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
